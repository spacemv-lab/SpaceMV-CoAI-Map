services:
  db:
    image: postgis/postgis:15-3.3
    container_name: txwx-postgis
    restart: always
    env_file:
      - ../../.envs/map-ai/dev/docker.env
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - ../../pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      default:
        aliases:
          - db

  redis:
    image: redis:7.2-alpine
    container_name: txwx-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - ../../redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      default:
        aliases:
          - redis

  # MinIO for local development
  # 本地开发用 MinIO，staging/production 使用内网/外网 MinIO
  minio:
    image: quay.io/minio/minio:latest
    container_name: txwx-minio
    restart: always
    command: server /data --console-address ":9001"
    env_file:
      - ../../.envs/map-ai/dev/docker.env
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - ../../miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      default:
        aliases:
          - minio

networks:
  default:
    name: txwx-local-network
