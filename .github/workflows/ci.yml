# GitHub Actions CI/CD 配置文件

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 取消正在运行的重复工作流
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 前端构建和测试
  # ============================================
  web-build:
    name: Web Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm nx lint map-ai

      - name: Type check
        run: pnpm nx typecheck map-ai

      - name: Build
        run: pnpm nx build map-ai

      - name: Test
        run: pnpm nx test map-ai --passWithNoTests

  # ============================================
  # 后端构建和测试
  # ============================================
  api-build:
    name: API Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm nx lint map-ai-api

      - name: Type check
        run: pnpm nx typecheck map-ai-api

      - name: Build
        run: pnpm nx build map-ai-api

      - name: Test
        run: pnpm nx test map-ai-api

  # ============================================
  # Python Agent 构建和测试
  # ============================================
  agent-build:
    name: Agent Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          cd apps/map-ai/agent
          uv sync --dev

      - name: Lint
        run: |
          cd apps/map-ai/agent
          uv run ruff check .

      - name: Format check
        run: |
          cd apps/map-ai/agent
          uv run ruff format --check .

      - name: Type check
        run: |
          cd apps/map-ai/agent
          uv run pyright .

      - name: Test
        run: |
          cd apps/map-ai/agent
          uv run pytest

  # ============================================
  # 代码质量检查
  # ============================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Format check (Prettier)
        run: pnpm prettier --check "**/*.{ts,tsx,js,jsx,json,md}"

  # ============================================
  # 安全扫描
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run TruffleHog (secret scan)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: NPM audit
        run: pnpm audit --audit-level=high || true

  # ============================================
  # 依赖协议检查
  # ============================================
  license-check:
    name: License Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check licenses
        run: |
          pnpm license-checker --summary --failOn "GPL;AGPL;LGPL;SSPL" || true
